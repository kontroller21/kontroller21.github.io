<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111522" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Kontroller</title>
    <link rel="stylesheet" href="../assets/site.css" />
  </head>
  <body class="controller-page">
    <main class="controller">
      <header class="controller-header">
        <p class="eyebrow">Skjermkontroll</p>
        <h1>Hva skal vises?</h1>
      </header>

      <section id="lock-panel" class="panel" aria-labelledby="lock-title">
        <h2 id="lock-title" class="lock-title">Skriv inn kode for å fortsette</h2>
        <div id="pin-dots" class="pin-dots" aria-label="Ingen sifre skrevet"></div>

        <div id="keypad" class="keypad">
          <button class="key" type="button" data-digit="1">1</button>
          <button class="key" type="button" data-digit="2">2</button>
          <button class="key" type="button" data-digit="3">3</button>
          <button class="key" type="button" data-digit="4">4</button>
          <button class="key" type="button" data-digit="5">5</button>
          <button class="key" type="button" data-digit="6">6</button>
          <button class="key" type="button" data-digit="7">7</button>
          <button class="key" type="button" data-digit="8">8</button>
          <button class="key" type="button" data-digit="9">9</button>
          <button class="key secondary" type="button" data-action="clear">Tøm</button>
          <button class="key" type="button" data-digit="0">0</button>
          <button class="key unlock" type="button" data-action="unlock">Åpne</button>
        </div>
        <p id="feedback" class="feedback" role="alert"></p>
      </section>

      <section id="controls-panel" class="panel controls" hidden>
        <button class="action red" type="button" data-preset="dinner">
          <span class="action-icon">🍽️</span>
          <span><strong>Middag</strong><small>Rød · «Nå er det middag!»</small></span>
        </button>

        <button class="action blue" type="button" data-preset="come-up">
          <span class="action-icon">⬆️</span>
          <span><strong>Kom opp</strong><small>Blå · «Kom opp!»</small></span>
        </button>

        <form id="custom-form" class="custom-form">
          <label for="custom-message">Egen melding på oransje bakgrunn</label>
          <div class="custom-row">
            <input
              id="custom-message"
              name="message"
              type="text"
              maxlength="160"
              placeholder="Skriv en melding …"
              autocomplete="off"
              required
            />
            <button type="submit">Vis</button>
          </div>
        </form>

        <button id="stop" class="stop" type="button">Stopp visning</button>
        <p id="connection" class="connection" role="status"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/config.js"></script>
    <script src="../assets/controller.js"></script>
  </body>
</html>
